<!DOCTYPE html>
<html>

<head>

    <title>Network Monitor Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>

        body {
            background-color: #111;
            color: white;
            font-family: Arial;
            padding: 20px;
        }

        h1 {
            color: cyan;
        }

        .metrics-container {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
        }

        .card {
            background-color: #222;
            padding: 20px;
            border-radius: 10px;
            width: 200px;
            box-shadow: 0 0 10px #000;
        }

        .card h2 {
            color: cyan;
        }

        #alerts {
            margin-top: 30px;
        }

        .alert {
            background: #300;
            padding: 10px;
            margin: 10px 0;
            border-left: 5px solid red;
        }
        canvas {
            background-color: #222;
            margin-top: 20px;
            padding: 10px;
            border-radius: 10px;
        }

    </style>

</head>

<body>

    <h1>IP Network Stream Monitor</h1>

    <div class="metrics-container">

        <div class="card">
            <h2>Total Packets</h2>
            <p id="total_packets">0</p>
        </div>

        <div class="card">
            <h2>TCP Packets</h2>
            <p id="tcp_packets">0</p>
        </div>

        <div class="card">
            <h2>UDP Packets</h2>
            <p id="udp_packets">0</p>
        </div>

        <div class="card">
            <h2>Alerts</h2>
            <p id="alerts_count">0</p>
        </div>
        <div class="card">
            <h2>Current Jitter</h2>
            <p id="current_jitter">0</p>
        </div>

        

    </div>
    <h2>Live Jitter Graph</h2>

    <canvas id="jitterChart"></canvas>

    <h2>Packet Traffic Graph</h2>

    <canvas id="trafficChart"></canvas>

    <h2>Live Alerts</h2>

    <div id="alerts"></div>

    <script>

        const alertsDiv =
            document.getElementById("alerts");
        const jitterLabels = [];
        const jitterData = [];

        const trafficLabels = [];
        const trafficData = [];

        const jitterChart = new Chart(
            document.getElementById("jitterChart"),
            {
                type: "line",
                data: {
                    labels: jitterLabels,
                    datasets: [{
                        label: "Jitter (sec)",
                        data: jitterData
                    }]
                }
            }
        );

        const trafficChart = new Chart(
            document.getElementById("trafficChart"),
            {
                type: "line",
                data: {
                    labels: trafficLabels,
                    datasets: [{
                        label: "Total Packets",
                        data: trafficData
                    }]
                }
            }
        );

        const socket =
            new WebSocket(
                "ws://127.0.0.1:8000/ws"
            );

        socket.onmessage = function(event) {

            const alertBox =
                document.createElement("div");

            alertBox.className = "alert";

            alertBox.innerText = event.data;

            alertsDiv.prepend(alertBox);
        };

        async function fetchMetrics() {

            const response =
                await fetch(
                    "http://127.0.0.1:8000/metrics"
                );

            const data =
                await response.json();

            document.getElementById(
                "total_packets"
            ).innerText =
                data.total_packets;

            document.getElementById(
                "tcp_packets"
            ).innerText =
                data.tcp_packets;

            document.getElementById(
                "udp_packets"
            ).innerText =
                data.udp_packets;

            document.getElementById(
                "alerts_count"
            ).innerText =
                data.alerts;

            document.getElementById(
                "current_jitter"
            ).innerText =
                data.current_jitter + " sec";
            const currentTime =
                new Date().toLocaleTimeString();

            jitterLabels.push(currentTime);
            jitterData.push(data.current_jitter);

            trafficLabels.push(currentTime);
            trafficData.push(data.total_packets);

            if (jitterLabels.length > 20) {

                jitterLabels.shift();
                jitterData.shift();

                trafficLabels.shift();
                trafficData.shift();
            }

            jitterChart.update();
            trafficChart.update();
        }

        setInterval(fetchMetrics, 1000);

    </script>

</body>

</html>
